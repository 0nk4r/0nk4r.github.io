name: Resize Images and Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  resize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: pip install tyro pillow thumbhash

      - name: Install dependencies
        run: pip install tyro pillow

      - name: Install Dependencies
        run: |
          pip install pillow

      - name: Run Image Resizing Script
        run: |
          python scripts/responsive_image_generator.py --in-path assets/images/

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Commit and Push Resized Images
        run: |
          git add assets/images/
          git commit -m "Auto-resized images" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/onk4r/onk4r.github.io.git main
